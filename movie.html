<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="css/movie.css">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/loader.css">
      <link rel="stylesheet" href="css/noticia.css">

    <title>Document</title>
</head>
<body>
  
  <div id="loader" class="loader">
<div class="loader-triangle-9">
    <div></div>
    <div></div>
</div>
</div>





<section class="seccion-banner-poster">

<div class="movie">

  <div class="media">
    <img id="movie-banner">
    <div class="degradado-banner"></div>
  </div>

  <div class="informacion-div">
    <div class="titulo-poster">
        <div class="informacion">
          <p id="movie-rating">TMDB |<span id="rating-span"></span></p>
          <h1 id="movie-title"></h1>
          <div class="creacion-director">
            <p id="movie-year"></p>
            <p class="circulo">●</p>
            <p>Dirigida por <br> <span id="movie-director"></span></p>
          </div>
          <div id="movie-genres"></div>
        </div>
        <div class="poster-puntuacion">
          <img id="movie-poster">
        </div>
    </div>
    <h5 class="Resumen">Resumen</h5>
    <div class="descripcion">
      <div class="degradado-descripcion"><p class="puntos">...</p></div>
      <p id="movie-overview"></p>
    </div>
  </div>
</div>

<section class="movie-news">

  <div class="news-toggle-container">
    <p class="news-toggle-label">Últimas noticias</p>
    <button class="news-toggle-btn">Mostrar noticias</button>
  </div>

  <div class="news-panel">
    <div id="news-container"></div>
  </div>

</section>

<section class="trailer">
  <div class="botton-container">
    <p class="titulo-trailer">Sumérgete en la historia</p>
    <button id="trailer-btn">Ver trailer</button>
  </div>
  <div id="trailer-container"></div>
</section>

<section class="post-casting">

  <!-- 🔘 BOTONES -->
  <div class="tabs-buttons">
    <button class="tab-btn active" data-tab="0">Posts</button>
    <button class="tab-btn" data-tab="1">Casting</button>
  </div>

  <!-- 💬 POSTS -->
  <div class="tab-page" id="tab-0">
    <div class="posts-container">
      <div class="create-post">
        <textarea id="post-text" placeholder="Comparte tu opinión..."></textarea>
        <div class="stars-container">
          <div class="stars-container">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
            <span class="star" data-value="6">★</span>
            <span class="star" data-value="7">★</span>
          </div>
          <div class="botones-mensaje">
            <button id="publish-post-btn">Publicar</button>
            <button id="spoiler-btn" class="spoiler-btn">⚠</button>
          </div>
        </div>
      </div>
      <div class="community-posts"></div>
    </div>
  </div>

  <!-- 🎭 CASTING -->
  <div class="tab-page" id="tab-1" style="display:none">
    <div class="cast-container"></div>
  </div>

  <!-- ⭐ REVIEWS -->
  <div class="tab-page" id="tab-2" style="display:none">
  </div>

</section>

</section>  

    <script type="module" src="js/univers.js"></script>
      <script src="js/loader.js"></script>
    <script type="module" src="js/movie.js"></script>
    <script type="module" src="js/credits.js"></script>
    <script src="js/noticia.js"></script>
</body>
</html>
